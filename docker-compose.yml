# 로컬 개발용 Postgres. 사용: docker compose up -d
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: xthex
    ports:
      - "5432:5432"
    volumes:
      - xthex_pg_data:/var/lib/postgresql/data

volumes:
  xthex_pg_data:
